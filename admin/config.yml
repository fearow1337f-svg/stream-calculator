backend:
  name: github
  repo: fearow1337f-svg/stream-calculator
  branch: main
  base_url: https://api.decapcms.org
  auth_endpoint: /auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "watched"
    label: "Просмотренные фильмы"
    folder: "_data/watched"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Название фильма", name: "searchTitle", widget: "string", hint: "Введи название фильма" }
      - { label: "Постер (ссылка)", name: "poster", widget: "string", required: false, hint: "Можешь вставить ссылку на постер (необязательно)" }
      - { label: "Дата просмотра", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - { label: "Ник заказчика", name: "viewer", widget: "string" }
      - { label: "ID Кинопоиска", name: "kinopoiskId", widget: "string", required: false }

  - name: "settings"
    label: "⚙️ Настройки цен"
    editor:
      preview: false
    files:
      - label: "Параметры калькулятора"
        name: "pricing"
        file: "_data/settings/pricing.json"
        fields:
          - label: "Базовая стоимость фильма (₽)"
            name: "basePrice"
            widget: "number"
            default: 500
            value_type: "int"
            min: 0
            step: 10
          - label: "Наценка за длительность > 120 мин (₽)"
            name: "longMovieSurcharge"
            widget: "number"
            default: 20
            value_type: "int"
            min: 0
            step: 5
          - label: "Базовая стоимость серии (₽)"
            name: "seriesBasePrice"
            widget: "number"
            default: 200
            value_type: "int"
            min: 0
            step: 10
