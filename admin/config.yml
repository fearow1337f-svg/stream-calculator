backend:
  name: github
  repo: fearow1337f-svg/stream-calculator
  branch: main
  base_url: https://decap-cms-oauth.vercel.app
  auth_endpoint: /auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "watched"
    label: "Просмотренные фильмы"
    folder: "_data/watched"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Название фильма"
        name: "searchTitle"
        widget: "autoposter"
        hint: "Введи точное название. После ввода нажми Tab — постер подгрузится сам."
      - label: "Постер"
        name: "poster"
        widget: "image"
        required: false
      - label: "Дата просмотра"
        name: "date"
        widget: "date"
      - label: "Ник заказчика"
        name: "viewer"
        widget: "string"
      - label: "ID Кинопоиска"
        name: "kinopoiskId"
        widget: "string"
        required: false
